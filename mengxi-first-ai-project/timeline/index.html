<!DOCTYPE html>
<html lang="zh-cn">

<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Notes Timeline | Mengxi&#39;s Blog</title>
<meta name="description"
    content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Patrick+Hand&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
<link rel="stylesheet" href="/css/unified-styles.css">
<link rel="stylesheet" href="/css/pudding-modern.css">
<link rel="stylesheet" href="/css/image-zoom.css">
<link rel="stylesheet" href="/css/poche-style.css">
<link rel="stylesheet" href="/css/poche-article.css">
<style>
    body {
        opacity: 0;
        animation: fadeInPage 0.5s ease-out forwards;
    }

    @keyframes fadeInPage {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }
</style></head>

<body class="theme-knowledge">
    <div class="hn-header" id="top-nav">
    <div class="hn-header-content">
        <h1 class="hn-title">
            <a href="/">Mengxi&#39;s Blog</a>
        </h1>
        <nav class="hn-nav">
            <a href="/posts">Posts</a>
            <a href="/graph">Graph</a>
            <a href="/timeline">Timeline</a>
            <a href="/search">Search</a>
            <button class="theme-toggle" id="theme-toggle">[ LIGHT ]</button>
        </nav>
    </div>
</div>
    <main class="u-container u-py-xl">
<div x-data="timelineApp()" class="u-container" style="max-width: 900px;">
    <header class="u-mb-xl" style="text-align: center;">
        <h1 class="hn-title">Chronological Flux</h1>
        <p
            style="color: var(--text-secondary); font-family: var(--font-serif); font-style: italic; font-size: 1.2rem; margin-top: 1rem;">
            A tracing of thoughts, captures, and digital artifacts.
        </p>
    </header>

    <div class="u-flex u-justify-center u-gap-md u-mb-2xl">
        <button @click="filter = 'all'" :class="filter === 'all' ? 'u-btn-active' : ''" class="timeline-filter-btn">All
            Artifacts</button>
        <button @click="filter = '学习笔记'" :class="filter === '学习笔记' ? 'u-btn-active' : ''"
            class="timeline-filter-btn">Learning</button>
        <button @click="filter = '灵感'" :class="filter === '灵感' ? 'u-btn-active' : ''"
            class="timeline-filter-btn">Inspiration</button>
    </div>

    <div style="position: relative; padding-left: 2rem; border-left: 1px solid rgba(255, 255, 255, 0.1);">
        <template x-for="item in filteredItems" :key="item.title + item.date">
            <div class="hn-item-container reveal-item active" style="margin-bottom: 3rem;">
                <div class="u-flex u-justify-between u-items-center u-mb-sm">
                    <span class="u-badge"
                        :style="{ backgroundColor: item.color, color: '#000', fontSize: '0.7rem', padding: '2px 8px', borderRadius: '4px' }"
                        x-text="item.type"></span>
                    <span style="color: var(--text-secondary); font-size: 0.85rem;" x-text="item.date"></span>
                </div>
                <h3 class="hn-title" style="font-size: 1.8rem; margin: 0.5rem 0;">
                    <span x-text="item.title"></span>
                </h3>
                <p style="color: var(--text-primary); opacity: 0.8; font-family: var(--font-serif); font-size: 1.1rem; line-height: 1.6;"
                    x-text="item.content"></p>

                <div class="u-flex u-gap-sm u-mt-md" style="flex-wrap: wrap;">
                    <template x-for="tag in item.tags" :key="tag">
                        <span style="color: var(--accent); font-size: 0.8rem; opacity: 0.7;">#<span
                                x-text="tag"></span></span>
                    </template>
                </div>
            </div>
        </template>
    </div>

    
    <div x-show="items.length === 0 && !isLoading"
        style="text-align: center; padding: 4rem; color: var(--text-secondary);">
        <p>No chronological data found. Run sync to populate.</p>
    </div>
</div>

<style>
    .timeline-filter-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        padding: 0.5rem 1.2rem;
        border-radius: 50px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        font-family: var(--font-sans);
    }

    .timeline-filter-btn:hover {
        border-color: var(--accent);
        color: var(--text-primary);
    }

    .timeline-filter-btn.u-btn-active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 0 15px rgba(255, 102, 0, 0.3);
    }
</style>

<script>
    function timelineApp() {
        return {
            items: [],
            filter: 'all',
            isLoading: true,
            init() {
                fetch('/timeline-data.json')
                    .then(r => r.json())
                    .then(data => {
                        this.items = data;
                        this.isLoading = false;
                    })
                    .catch(err => {
                        console.error('Timeline fetch error:', err);
                        this.isLoading = false;
                    });
            },
            get filteredItems() {
                if (this.filter === 'all') return this.items;
                return this.items.filter(item => item.type === this.filter);
            }
        }
    }
</script>
</main>
    <footer class="u-container u-py-xl u-text-center">
    <div class="u-mb-md">
        <span class="u-text-2xl">🌱</span>
    </div>
    <p class="u-text-light">
        © 2026 Mengxi&#39;s Blog. Cultivated with intention.
    </p>
</footer>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true, theme: 'base' });
    </script>
    <script src="/js/copy-code.js"></script>
    <script src="/js/hn-interactions.js"></script>
    <script src="/js/image-zoom.js"></script>
    <script src="/js/ux-booster.js"></script>
    <script src="/js/poche-interactions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        });
    </script>
</body>

</html>
