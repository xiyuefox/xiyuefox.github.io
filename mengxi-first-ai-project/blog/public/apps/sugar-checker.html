<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕期控糖红绿灯 | 饮食小助手</title>
    <style>
        :root {
            --primary-color: #88B04B;
            --bg-color: #F0F4E8;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2D3436;
            --text-light: #636E72;
            --accent-color: #6C5CE7;

            --light-green: #00B894;
            --light-yellow: #FDCB6E;
            --light-red: #D63031;
        }

        body {
            font-family: 'PingFang SC', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #F0F4E8 0%, #E8EDDF 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigation Tabs */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        .view-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            padding-bottom: 120px;
            box-sizing: border-box;
            display: none;
        }

        .view-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Search Styles */
        .search-container {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        input[type="search"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 20px;
            outline: none;
            background: var(--card-bg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* Food Card Styles */
        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .food-name {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-badge.green {
            background: #E8F5E9;
            color: var(--light-green);
        }

        .status-badge.yellow {
            background: #FFF8E1;
            color: #F39C12;
        }

        .status-badge.red {
            background: #FFEBEE;
            color: var(--light-red);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.02);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .data-val {
            font-weight: 700;
        }

        .tips-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #444;
            padding-left: 10px;
            border-left: 3px solid var(--primary-color);
        }

        .add-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        /* Plate Panel */
        .plate-bar {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(136, 176, 75, 0.3);
        }

        .plate-items-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .chip {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .save-meal-btn {
            width: 100%;
            background: white;
            color: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
        }

        /* History View */
        .log-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .log-date {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .log-gl {
            position: absolute;
            right: 20px;
            top: 20px;
            text-align: right;
        }

        .gl-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-color);
        }

        .bs-input-row {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }

        input.bs-val {
            width: 70px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .empty-history {
            text-align: center;
            padding: 50px 0;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <!-- Main Views -->
    <div id="viewSearch" class="view-container active">
        <header>
            <h1>🚦 控糖助手</h1>
            <div class="subtitle">让每一次餐食都心中有数</div>
        </header>

        <div class="search-container">
            <input type="search" id="searchInput" placeholder="搜索食物，如：糙米饭..." autocomplete="off">
        </div>

        <div id="resultsContainer"></div>

        <div id="plateBar" class="plate-bar" style="display: none;">
            <div style="font-weight: 800;">🍽️ 待选方案</div>
            <div id="plateChips" class="plate-items-chips"></div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div>预计总 GL: <span id="totalGL" style="font-size: 1.5rem; font-weight: 900;">0</span></div>
                    <div id="movementTip" style="font-size: 0.75rem; opacity: 0.9;"></div>
                </div>
                <button class="save-meal-btn" onclick="saveMeal()">记录这餐</button>
            </div>
        </div>
    </div>

    <div id="viewHistory" class="view-container">
        <header>
            <h1>📒 饮食手册</h1>
            <div class="subtitle">回顾你的控糖历练</div>
        </header>
        <div id="historyList"></div>
    </div>

    <!-- Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('viewSearch', this)">
            <span class="nav-icon">🔍</span>
            <span>查询搭配</span>
        </div>
        <div class="nav-item" onclick="switchView('viewHistory', this)">
            <span class="nav-icon">📊</span>
            <span>分析记录</span>
        </div>
    </nav>

    <script src="js/food_database.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const plateBar = document.getElementById('plateBar');
        const plateChips = document.getElementById('plateChips');
        const totalGLEl = document.getElementById('totalGL');
        const movementTipEl = document.getElementById('movementTip');
        const historyListEl = document.getElementById('historyList');

        let currentPlate = [];
        let mealLogs = JSON.parse(localStorage.getItem('sugar_meal_logs')) || [];

        function switchView(viewId, element) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');

            if (viewId === 'viewHistory') renderHistory();
        }

        function addToPlate(name) {
            const food = foodDatabase.find(f => f.name === name);
            if (food) {
                currentPlate.push({ ...food, id: Date.now() });
                updatePlateUI();
            }
        }

        function removeFromPlate(id) {
            currentPlate = currentPlate.filter(i => i.id !== id);
            updatePlateUI();
        }

        function updatePlateUI() {
            if (currentPlate.length === 0) {
                plateBar.style.display = 'none';
                return;
            }
            plateBar.style.display = 'block';
            plateChips.innerHTML = currentPlate.map(item => `
                <div class="chip">
                    ${item.name} <span style="cursor:pointer" onclick="removeFromPlate(${item.id})">×</span>
                </div>
            `).join('');

            const sumGL = currentPlate.reduce((sum, item) => sum + item.gl, 0).toFixed(1);
            totalGLEl.innerText = sumGL;

            let moveTip = '';
            if (sumGL <= 10) moveTip = '🍬 糖负荷极低，餐后散步10分钟即可。';
            else if (sumGL <= 20) moveTip = '🚶 建议餐后通过快走20-30分钟消耗。';
            else moveTip = '⚠️ 糖负荷较高！建议增加抗阻力运动或延长快走。';
            movementTipEl.innerText = moveTip;
        }

        function saveMeal() {
            if (currentPlate.length === 0) return;
            const meal = {
                timestamp: new Date().toLocaleString(),
                foods: currentPlate.map(f => f.name),
                totalGL: currentPlate.reduce((sum, item) => sum + item.gl, 0).toFixed(1),
                bsValue: null
            };
            mealLogs.unshift(meal);
            localStorage.setItem('sugar_meal_logs', JSON.stringify(mealLogs));

            alert('记录成功！已存入饮食手册。');
            currentPlate = [];
            updatePlateUI();
        }

        function updateBS(index, val) {
            mealLogs[index].bsValue = val;
            localStorage.setItem('sugar_meal_logs', JSON.stringify(mealLogs));
        }

        function renderHistory() {
            if (mealLogs.length === 0) {
                historyListEl.innerHTML = '<div class="empty-history">还没记录过餐食哦，快去搭配一顿吧！</div>';
                return;
            }

            historyListEl.innerHTML = mealLogs.map((log, index) => `
                <div class="log-card">
                    <div class="log-date">${log.timestamp}</div>
                    <div style="font-weight: 700; color: #555;">${log.foods.join(' + ')}</div>
                    
                    <div class="log-gl">
                        <div style="font-size: 0.6rem; color: #999;">MEAL GL</div>
                        <div class="gl-number">${log.totalGL}</div>
                    </div>

                    <div class="bs-input-row">
                        <span style="font-size: 0.85rem;">餐后2h血糖:</span>
                        <input type="number" class="bs-val" 
                               value="${log.bsValue || ''}" 
                               placeholder="--" 
                               onchange="updateBS(${index}, this.value)">
                        <span style="font-size: 0.8rem; color: #888;">mmol/L</span>
                    </div>
                </div>
            `).join('');
        }

        function renderResults(foods) {
            resultsContainer.innerHTML = foods.map(food => `
                <div class="food-card">
                    <div class="card-header">
                        <div class="food-name">${food.name} <span style="font-size:0.7rem; color:#999; font-weight:normal">${food.category}</span></div>
                        <div class="status-badge ${food.traffic_light}">
                            ${food.traffic_light === 'green' ? '🟢 优选' : (food.traffic_light === 'yellow' ? '🟡 限量' : '🔴 严选')}
                        </div>
                    </div>
                    <div class="data-row">
                        <div>GI: <span class="data-val">${food.gi}</span></div>
                        <div>GL: <span class="data-val">${food.gl}</span></div>
                        <div>CAL: <span class="data-val">${food.cal}</span></div>
                    </div>
                    <div class="tips-text">${food.tips}</div>
                    <button class="add-btn" onclick="addToPlate('${food.name}')">+ 加入方案</button>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (!query) { resultsContainer.innerHTML = ''; return; }
            const matches = foodDatabase.filter(f => f.name.includes(query) || f.category.includes(query));
            renderResults(matches);
        });
    </script>
</body>

</html>
