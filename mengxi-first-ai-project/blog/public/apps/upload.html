<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文件上传系统 - Mengxi Times</title>

    <!-- Unified Design System -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/unified-styles.css">

    <style>
        /* Specific overrides for upload layout */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-xl);
            margin-top: var(--space-xl);
        }

        .drop-zone {
            border: 2px dashed var(--knowledge-border);
            border-radius: var(--radius-md);
            padding: var(--space-xl);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
            background: var(--knowledge-bg-light);
            margin-top: var(--space-md);
        }

        .drop-zone:hover,
        .drop-zone.hover {
            border-color: var(--knowledge-primary);
            background: rgba(45, 106, 79, 0.05);
            /* Tint of primary */
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: var(--space-md);
            display: block;
        }

        .file-input {
            display: none;
        }

        #result {
            margin-top: var(--space-xl);
            border-left: 5px solid var(--success-color, #2ecc71);
        }

        #file-preview img,
        #file-preview video,
        #file-preview iframe {
            max-width: 100%;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            margin-top: var(--space-md);
        }

        .url-input {
            width: 100%;
            padding: var(--space-sm);
            border: 1px solid var(--text-light);
            border-radius: var(--radius-sm);
            font-family: monospace;
            margin-bottom: var(--space-sm);
        }
    </style>
</head>

<body class="theme-knowledge">

    <!-- Unified Navigation -->
    <nav class="u-nav">
        <div class="u-container u-nav__container">
            <a href="index.html" class="u-nav__brand">🌿 Mengxi Times</a>
            <ul class="u-nav__links">
                <li><a href="index.html" class="u-nav__link">首页</a></li>
                <li><a href="#" class="u-nav__link u-nav__link--active">上传工具</a></li>
            </ul>
        </div>
    </nav>

    <main class="u-container" style="padding-top: var(--space-xl);">
        <header class="u-text-center" style="margin-bottom: var(--space-xl);">
            <h1 class="u-text-4xl u-font-bold u-mb-md">📁 智能文件上传系统</h1>
            <p class="u-text-lg u-text-light">快速上传图片与文件到云端存储</p>
        </header>

        <!-- 上传区域 -->
        <div class="upload-grid">
            <!-- 图片上传区 -->
            <div class="u-card">
                <div class="u-text-center">
                    <span class="upload-icon">🖼️</span>
                    <h2 class="u-text-2xl u-font-bold">图片文件上传</h2>
                    <p class="u-text-sm u-text-light">支持 JPG, PNG, GIF, WebP</p>
                </div>

                <div id="image-drop-zone" class="drop-zone">
                    <p class="u-mb-md">点击或拖拽图片到这里</p>
                    <input type="file" id="image-file-input" class="file-input" accept="image/*">
                    <button class="u-btn u-btn--primary"
                        onclick="document.getElementById('image-file-input').click()">选择图片</button>
                </div>
            </div>

            <!-- 其他文件上传区 -->
            <div class="u-card">
                <div class="u-text-center">
                    <span class="upload-icon">📄</span>
                    <h2 class="u-text-2xl u-font-bold">其他文件上传</h2>
                    <p class="u-text-sm u-text-light">支持 PDF, 视频, 文档等</p>
                </div>

                <div id="file-drop-zone" class="drop-zone">
                    <p class="u-mb-md">点击或拖拽文件到这里</p>
                    <input type="file" id="general-file-input" class="file-input" accept="*/*">
                    <button class="u-btn u-btn--secondary"
                        onclick="document.getElementById('general-file-input').click()">选择文件</button>
                </div>
            </div>
        </div>

        <!-- 上传结果 -->
        <div id="result" class="u-card" style="display: none">
            <h3 class="u-text-xl u-font-bold u-mb-md" style="color: var(--success-color, #2ecc71);">✅ 上传成功！</h3>
            <div class="file-info">
                <strong class="u-block u-mb-sm">文件 URL：</strong>
                <input type="text" id="image-url" class="url-input" readonly>
                <button class="u-btn u-btn--outline u-mb-md" onclick="copyUrl()">复制链接</button>
            </div>

            <div class="file-info">
                <strong class="u-block u-mb-sm">Obsidian 格式：</strong>
                <input type="text" id="obsidian-md" class="url-input" readonly>
                <button class="u-btn u-btn--primary u-mb-md" onclick="copyMarkdown()">复制 Obsidian 格式</button>
            </div>

            <div id="file-preview"></div>
        </div>
    </main>

    <script>
        // 已替换为您的 Worker 地址
        const API_URL = 'https://xixi-image-bed.jinxiyue07.workers.dev/upload';

        // 图片上传区事件处理
        const imageDropZone = document.getElementById('image-drop-zone');
        const imageFileInput = document.getElementById('image-file-input');

        // 其他文件上传区事件处理
        const fileDropZone = document.getElementById('file-drop-zone');
        const generalFileInput = document.getElementById('general-file-input');

        const result = document.getElementById('result');
        const imageUrl = document.getElementById('image-url');
        const obsidianMd = document.getElementById('obsidian-md');
        const filePreview = document.getElementById('file-preview');

        // 图片上传区事件
        imageDropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') imageFileInput.click();
        });

        imageDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageDropZone.classList.add('hover');
        });

        imageDropZone.addEventListener('dragleave', () => {
            imageDropZone.classList.remove('hover');
        });

        imageDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            imageDropZone.classList.remove('hover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                if (files[0].type.startsWith('image/')) {
                    uploadFile(files[0]);
                } else {
                    alert('请上传图片文件！');
                }
            }
        });

        imageFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        // 其他文件上传区事件
        fileDropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') generalFileInput.click();
        });

        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('hover');
        });

        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('hover');
        });

        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('hover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                if (!files[0].type.startsWith('image/')) {
                    uploadFile(files[0]);
                } else {
                    alert('请上传到图片上传区域！');
                }
            }
        });

        generalFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        // 上传函数
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                let currentDropZone;
                if (file.type.startsWith('image/')) {
                    currentDropZone = imageDropZone;
                } else {
                    currentDropZone = fileDropZone;
                }

                const originalContent = currentDropZone.innerHTML;
                currentDropZone.innerHTML = '<p class="u-animate-pulse">⏳ 上传中...</p>';

                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    const fileUrl = data.url;
                    imageUrl.value = fileUrl;

                    // 生成 Obsidian 格式
                    obsidianMd.value = `![${file.name}](${fileUrl})`;

                    if (file.type.startsWith('image/')) {
                        filePreview.innerHTML = `<strong>图片预览：</strong><br><img src="${fileUrl}" alt="上传的图片">`;
                    } else if (file.type.startsWith('video/')) {
                        filePreview.innerHTML = `<strong>视频预览：</strong><br><video src="${fileUrl}" controls>您的浏览器不支持视频播放。</video>`;
                    } else if (file.type === 'application/pdf') {
                        filePreview.innerHTML = `<strong>PDF 预览：</strong><br><iframe src="${fileUrl}" width="100%" height="500px"></iframe>`;
                    } else {
                        filePreview.innerHTML = `<strong>文件已上传，不支持在线预览</strong>`;
                    }

                    result.style.display = 'block';
                    currentDropZone.innerHTML = originalContent; // Restore UI
                } else {
                    alert('上传失败：' + data.error);
                    currentDropZone.innerHTML = originalContent;
                }
            } catch (error) {
                alert('上传失败：' + error.message);
                // currentDropZone might not be defined if error happens early, but risk is low here
                window.location.reload();
            }
        }

        function copyUrl() {
            imageUrl.select();
            imageUrl.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('链接已成功复制到剪贴板！');
        }

        function copyMarkdown() {
            obsidianMd.select();
            obsidianMd.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('Obsidian 格式已成功复制！');
        }
    </script>
</body>

</html>
