        from {
            opacity: 0;

<body class="theme-knowledge">
    <div class="hn-header" id="top-nav">
    <div class="hn-header-content">
        <h1 class="hn-title">
            <a href="/">Mengxi&#39;s Blog</a>
        </h1>
        <nav class="hn-nav">
            <a href="/posts">Posts</a>
            <a href="/graph">Graph</a>
            <a href="/timeline">Timeline</a>
            <a href="/search">Search</a>

        </nav>

</div>
    <main class="u-container u-py-xl">
<header class="u-text-center" style="margin-bottom: var(--space-xl);">
    <h1 class="u-text-4xl u-font-bold u-mb-md">📁 智能文件上传系统</h1>
    <p class="u-text-lg u-text-light">快速上传图片与文件到云端存储</p>
</header>


<div class="upload-grid">
    
    <div class="u-card">
        <div class="u-text-center">
            <span class="upload-icon">🖼️</span>
            <h2 class="u-text-2xl u-font-bold">图片文件上传</h2>
            <p class="u-text-sm u-text-light">支持 JPG, PNG, GIF, WebP</p>
        </div>

        <div id="image-drop-zone" class="drop-zone">
            <p class="u-mb-md">点击或拖拽图片到这里</p>
            <input type="file" id="image-file-input" class="file-input" accept="image/*">
            <button class="u-btn u-btn--primary"
                onclick="document.getElementById('image-file-input').click()">选择图片</button>
        </div>
    </div>

    
    <div class="u-card">
        <div class="u-text-center">
            <span class="upload-icon">📄</span>
            <h2 class="u-text-2xl u-font-bold">其他文件上传</h2>
            <p class="u-text-sm u-text-light">支持 PDF, 视频, 文档等</p>
        </div>

        <div id="file-drop-zone" class="drop-zone">
            <p class="u-mb-md">点击或拖拽文件到这里</p>
            <input type="file" id="general-file-input" class="file-input" accept="*/*">
            <button class="u-btn u-btn--secondary"
                onclick="document.getElementById('general-file-input').click()">选择文件</button>
        </div>
    </div>
</div>


<div id="result" class="u-card" style="display: none">
    <h3 class="u-text-xl u-font-bold u-mb-md" style="color: var(--success-color, #2ecc71);">✅ 上传成功！</h3>
    <div class="file-info">
        <strong class="u-block u-mb-sm">文件 URL：</strong>
        <input type="text" id="image-url" class="url-input" readonly>
    </div>
    <button class="u-btn u-btn--outline" onclick="copyUrl()">复制链接</button>

    <div id="file-preview"></div>
</div>

<style>
     
    .upload-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: var(--space-xl);
        margin-top: var(--space-xl);
    }

    .drop-zone {
        border: 2px dashed var(--knowledge-border);
        border-radius: var(--radius-md);
        padding: var(--space-xl);
        text-align: center;
        cursor: pointer;
        transition: all var(--transition-base);
        background: var(--knowledge-bg-light);
        margin-top: var(--space-md);
    }

    .drop-zone:hover,
    .drop-zone.hover {
        border-color: var(--knowledge-primary);
        background: rgba(45, 106, 79, 0.05);
         
        transform: translateY(-2px);
    }

    .upload-icon {
        font-size: 3rem;
        margin-bottom: var(--space-md);
        display: block;
    }

    .file-input {
        display: none;
    }

    #result {
        margin-top: var(--space-xl);
        border-left: 5px solid var(--success-color, #2ecc71);
    }

    #file-preview img,
    #file-preview video,
    #file-preview iframe {
        max-width: 100%;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        margin-top: var(--space-md);
    }

    .url-input {
        width: 100%;
        padding: var(--space-sm);
        border: 1px solid var(--text-light);
        border-radius: var(--radius-sm);
        font-family: monospace;
        margin-bottom: var(--space-sm);
    }
</style>

<script>
    
    const API_URL = 'https://mengxi-upload-worker.jinxiyue07.workers.dev/';

    
    const imageDropZone = document.getElementById('image-drop-zone');
    const imageFileInput = document.getElementById('image-file-input');

    
    const fileDropZone = document.getElementById('file-drop-zone');
    const generalFileInput = document.getElementById('general-file-input');

    const result = document.getElementById('result');
    const imageUrl = document.getElementById('image-url');
    const filePreview = document.getElementById('file-preview');

    
    if (imageDropZone) {
        imageDropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') imageFileInput.click();
        });

        imageDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageDropZone.classList.add('hover');
        });

        imageDropZone.addEventListener('dragleave', () => {
            imageDropZone.classList.remove('hover');
        });

        imageDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            imageDropZone.classList.remove('hover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                if (files[0].type.startsWith('image/')) {
                    uploadFile(files[0]);
                } else {
                    alert('请上传图片文件！');
                }
            }
        });
    }

    if (imageFileInput) {
        imageFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });
    }

    
    if (fileDropZone) {
        fileDropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') generalFileInput.click();
        });

        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('hover');
        });

        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('hover');
        });

        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('hover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                if (!files[0].type.startsWith('image/')) {
                    uploadFile(files[0]);
                } else {
                    alert('请上传到图片上传区域！');
                }
            }
        });
    }

    if (generalFileInput) {
        generalFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });
    }

    
    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);

        try {
            let currentDropZone;
            if (file.type.startsWith('image/')) {
                currentDropZone = imageDropZone;
            } else {
                currentDropZone = fileDropZone;
            }

            const originalContent = currentDropZone.innerHTML;
            currentDropZone.innerHTML = '<p class="u-animate-pulse">⏳ 上传中...</p>';

            const response = await fetch(API_URL, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.success) {
                const fileUrl = data.url;
                imageUrl.value = fileUrl;

                if (file.type.startsWith('image/')) {
                    filePreview.innerHTML = `<strong>图片预览：</strong><br><img src="${fileUrl}" alt="上传的图片">`;
                } else if (file.type.startsWith('video/')) {
                    filePreview.innerHTML = `<strong>视频预览：</strong><br><video src="${fileUrl}" controls>您的浏览器不支持视频播放。</video>`;
                } else if (file.type === 'application/pdf') {
                    filePreview.innerHTML = `<strong>PDF 预览：</strong><br><iframe src="${fileUrl}" width="100%" height="500px"></iframe>`;
                } else {
                    filePreview.innerHTML = `<strong>文件已上传，不支持在线预览</strong>`;
                }

                result.style.display = 'block';
                currentDropZone.innerHTML = originalContent; 
            } else {
                alert('上传失败：' + data.error);
                currentDropZone.innerHTML = originalContent;
            }
        } catch (error) {
            alert('上传失败：' + error.message);
            
            window.location.reload();
        }
    }

    function copyUrl() {
        imageUrl.select();
        imageUrl.setSelectionRange(0, 99999);
        document.execCommand('copy');
        alert('链接已成功复制到剪贴板！');
    }
</script>
</main>

    <div class="u-mb-md">
        <span class="u-text-2xl">🌱</span>
    </div>

        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true, theme: 'base' });
    </script>
    <script src="/js/copy-code.js"></script>
    <script src="/js/hn-interactions.js"></script>
    <script src="/js/image-zoom.js"></script>
    <script src="/js/ux-booster.js"></script>
    <script src="/js/poche-interactions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        });
    </script>
</body>

</html>
