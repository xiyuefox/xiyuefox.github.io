<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default " en" }}">

<head>{{ partial "head.html" . }}</head>

<body class="tg-theme-dark">
    <div class="tg-container">
        {{ partial "header.html" . }}

        <div class="tg-layout">
            {{ partial "sidebar.html" . }}
            <main class="tg-main">
                {{ block "main" . }}{{ end }}
            </main>
        </div>

        {{ partial "footer.html" . }}
    </div>

    <script src="{{ " js/copy-code.js" | relURL }}"></script>
    <script src="{{ " js/image-zoom.js" | relURL }}"></script>
    <script>
        // Simple Theme Toggle Implementation
        function toggleTheme() {
            const currentTheme = document.documentElement.dataset.theme || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = newTheme;
            localStorage.setItem('tg-theme', newTheme);
            document.getElementById('theme-icon').innerText = newTheme === 'dark' ? '🌙' : '☀️';
        }

        // Initialize theme icon
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('tg-theme') || 'dark';
            document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        });
    </script>
</body>

</html>
