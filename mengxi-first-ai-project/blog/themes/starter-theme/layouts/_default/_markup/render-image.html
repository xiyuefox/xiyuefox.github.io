{{- $src := .Destination -}}
{{- $alt := .Text -}}
{{- $title := .Title -}}

<figure class="article-image">
    <img src="{{ $src | safeURL }}" alt="{{ $alt }}" {{ with $title }} title="{{ . }}" {{ end }} loading="lazy">
    {{ with $alt }}
    <figcaption class="image-caption">{{ . }}</figcaption>
    {{ end }}
</figure>
